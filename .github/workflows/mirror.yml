name: mirror-arduino

on:
  schedule:
    # Weekly, Sunday 03:17 UTC (avoid the :00 storm).
    - cron: "17 3 * * 0"
  workflow_dispatch: {}        # manual run from the Actions tab

permissions:
  contents: read

env:
  MIRROR_HOST: "https://arduino-downloads.amperka.ru"
  ARCHITECTURES: "avr,samd,sam,megaavr,mbed_nano,mbed_rp2040"
  PACKAGES: "arduino,builtin"
  LATEST_ONLY: "true"
  TARGET_KIND: "s3"
  # Public-read is enforced via a bucket policy on the managed prefix
  # (S3Target.prepare_public_read), best-effort. The bucket should also allow
  # anonymous GET in Yandex for end users to fetch without credentials.

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Build manifest + sync bucket (manifest -> upload/delete)
        env:
          TARGET_BUCKET: "${{ secrets.TARGET_BUCKET }}"
          TARGET_ENDPOINT: "${{ secrets.TARGET_ENDPOINT }}"
          TARGET_PREFIX: ""
          AWS_ACCESS_KEY_ID: "${{ secrets.TARGET_ACCESS_KEY_ID }}"
          AWS_SECRET_ACCESS_KEY: "${{ secrets.TARGET_SECRET_ACCESS_KEY }}"
        run: uv run arduino-mirror run
