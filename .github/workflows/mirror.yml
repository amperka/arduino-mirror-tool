name: mirror-arduino

on:
  schedule:
    # Weekly, Sunday 03:17 UTC (avoid the :00 storm).
    - cron: "17 3 * * 0"
  workflow_dispatch: {}        # manual run from the Actions tab

permissions:
  contents: read

env:
  MIRROR_HOST: "https://arduino-downloads.amperka.ru"
  ARCHITECTURES: "avr"
  PACKAGES: "arduino"
  LATEST_ONLY: "true"
  RCLONE_CONFIG_STORAGE_TYPE: s3
  RCLONE_CONFIG_STORAGE_PROVIDER: Other
  RCLONE_CONFIG_STORAGE_ACL: public-read
  RCLONE_CONFIG_STORAGE_ENDPOINT: "${{ secrets.RCLONE_CONFIG_STORAGE_ENDPOINT }}"
  RCLONE_CONFIG_STORAGE_ACCESS_KEY_ID: "${{ secrets.RCLONE_CONFIG_STORAGE_ACCESS_KEY_ID }}"
  RCLONE_CONFIG_STORAGE_SECRET_ACCESS_KEY: "${{ secrets.RCLONE_CONFIG_STORAGE_SECRET_ACCESS_KEY }}"

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Build manifest + sync bucket (manifest -> upload/delete)
        env:
          RCLONE_REMOTE: storage
          RCLONE_BUCKET: "${{ secrets.RCLONE_BUCKET }}"
          # Prefix empty -> index published at bucket root (package_index.json).
          # Stale cleanup is still safe: only deletes keys under the top-level
          # dirs the mirror writes (cores/, tools/), never hand-placed root
          # files like index.txt or arduino-*.tar.xz.
          RCLONE_PREFIX: ""
        run: uv run arduino-mirror run

      # Optional post-check: confirm the published index is reachable + correct.
      - name: Verify published mirror
        if: success()
        run: |
          curl -fsS "$MIRROR_HOST/package_index.json" -o /tmp/pub.json
          python3 - <<'PY'
          import json
          idx = json.load(open("/tmp/pub.json"))
          pkgs = {p["name"]: p for p in idx["packages"]}
          plats = [p["version"] for p in pkgs["arduino"]["platforms"]]
          print("published arduino avr versions:", plats)
          assert plats == ["1.8.8"], plats
          PY
